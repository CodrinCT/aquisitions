services:
  app:
    build:
      context: .
      target: development
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      neon-local:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.PORT||3000;fetch(`http://127.0.0.1:${port}/health`).then(response=>process.exit(response.ok?0:1)).catch(()=>process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: tooling
    profiles:
      - tools
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
    depends_on:
      neon-local:
        condition: service_healthy

  neon-local:
    image: neondatabase/neon_local:latest
    env_file:
      - .env.development
    ports:
      - "5432:5432"
    volumes:
      - ./.neon_local:/tmp/.neon_local
      - ./.git/HEAD:/tmp/.git/HEAD:ro,consistent
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf --max-time 5 -X POST http://127.0.0.1:5432/sql -H 'Content-Type: application/json' -d '{\"query\":\"SELECT 1\",\"params\":[]}' -o /dev/null || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
