services:
  app:
    build:
      context: .
      target: production
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.PORT||3000;fetch(`http://127.0.0.1:${port}/health`).then(response=>process.exit(response.ok?0:1)).catch(()=>process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: tooling
    profiles:
      - tools
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
